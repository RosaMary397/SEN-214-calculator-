```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1e1e2f;
}

.calculator {
    background: #2d2d44;
    border-radius: 20px;
    padding: 20px;
    width: 420px;
    box-shadow: 0 20px 40px rgba(0,0,0,.5);
}

/* Two-row display */
.display-container {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 15px 20px;
    margin-bottom: 20px;
    min-height: 100px;
    box-shadow: inset 0 4px 8px rgba(0,0,0,.4);
}

.expression {
    color: #888;
    font-size: 1.2rem;
    text-align: right;
    min-height: 30px;
    word-break: break-all;
}

.result {
    color: white;
    font-size: 2.4rem;
    text-align: right;
    min-height: 50px;
    word-break: break-all;
}

/* Buttons */
.buttons {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
}

button {
    padding: 18px;
    font-size: 1.2rem;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    background: #3d3d5c;
    color: white;
    cursor: pointer;
    transition: .15s;
    box-shadow: 0 4px 0 #1a1a2e;
}

button:hover {
    transform: translateY(-2px);
}

button:active {
    transform: translateY(4px);
    box-shadow: none;
}

.operator {
    background: #f39c12;
    color: #111;
}

.clear {
    background: #e74c3c;
}

.delete {
    background: #e67e22;
}

.equals {
    background: #2ecc71;
    color: #111;
}

.zero {
    grid-column: span 2;
}
</style>
</head>

<body>

<div class="calculator">

    <div class="display-container">
        <div class="expression" id="expression"></div>
        <div class="result" id="display">0</div>
    </div>

    <div class="buttons">

        <!-- Scientific -->
        <button class="operator" onclick="applyFunction('sin')">sin</button>
        <button class="operator" onclick="applyFunction('cos')">cos</button>
        <button class="operator" onclick="applyFunction('tan')">tan</button>
        <button class="operator" onclick="applyFunction('sinh')">sinh</button>
        <button class="operator" onclick="applyFunction('cosh')">cosh</button>

        <button class="operator" onclick="applyFunction('tanh')">tanh</button>
        <button class="operator" onclick="applyFunction('sqrt')">√</button>
        <button class="operator" onclick="applyFunction('log')">log</button>
        <button class="operator" onclick="applyFunction('ln')">ln</button>
        <button class="operator" onclick="applyFunction('factorial')">x!</button>

        <!-- Controls -->
        <button class="clear" onclick="clearAll()">AC</button>
        <button class="delete" onclick="deleteLast()">⌫</button>
        <button class="operator" onclick="appendNumber('(')">(</button>
        <button class="operator" onclick="appendNumber(')')">)</button>
        <button class="operator" onclick="appendNumber('^')">xʸ</button>

        <!-- Main -->
        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="chooseOperation('/')">÷</button>
        <button class="operator" onclick="appendNumber('π')">π</button>

        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="chooseOperation('*')">×</button>
        <button class="operator" onclick="appendNumber('e')">e</button>

        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button class="operator" onclick="chooseOperation('-')">−</button>
        <button class="equals" onclick="calculate()">=</button>

        <button class="zero" onclick="appendNumber('0')">0</button>
        <button onclick="appendNumber('.')">.</button>
        <button class="operator" onclick="chooseOperation('+')">+</button>

    </div>
</div>

<script>
let currentInput = '';
let expression = '';
let previousInput = '';
let operation = null;
let shouldResetScreen = false;

const display = document.getElementById('display');
const expressionDisplay = document.getElementById('expression');

function updateDisplay() {
    display.textContent = currentInput || '0';
    expressionDisplay.textContent = expression;
}

function appendNumber(num) {
    if (shouldResetScreen) {
        currentInput = '';
        shouldResetScreen = false;
    }

    if (num === '.' && currentInput.includes('.')) return;

    if (num === 'π') num = Math.PI;
    if (num === 'e') num = Math.E;

    currentInput += num;
    expression += num;

    updateDisplay();
}

function chooseOperation(op) {
    if (currentInput === '') return;

    if (previousInput !== '' && operation !== null) {
        calculate();
    }

    operation = op;
    previousInput = currentInput;
    currentInput = '';
    expression += op;

    updateDisplay();
}

function calculate() {
    let result;

    if (expression.includes('^')) {
        let parts = expression.split('^');
        result = Math.pow(parseFloat(parts[0]), parseFloat(parts[1]));
    } else {
        const prev = parseFloat(previousInput);
        const curr = parseFloat(currentInput);

        switch (operation) {
            case '+':
                result = prev + curr;
                break;
            case '-':
                result = prev - curr;
                break;
            case '*':
                result = prev * curr;
                break;
            case '/':
                if (curr === 0) {
                    currentInput = 'Error';
                    expression = '';
                    updateDisplay();
                    return;
                }
                result = prev / curr;
                break;
            default:
                return;
        }
    }

    result = parseFloat(result.toFixed(10));

    expressionDisplay.textContent = expression + '=';
    currentInput = String(result);
    expression = '';
    previousInput = '';
    operation = null;
    shouldResetScreen = true;

    updateDisplay();
}

function applyFunction(func) {
    let num = parseFloat(currentInput);
    if (isNaN(num)) return;

    switch (func) {
        case 'sin':
            currentInput = String(Math.sin(num * Math.PI / 180));
            break;
        case 'cos':
            currentInput = String(Math.cos(num * Math.PI / 180));
            break;
        case 'tan':
            currentInput = String(Math.tan(num * Math.PI / 180));
            break;
        case 'sinh':
            currentInput = String(Math.sinh(num));
            break;
        case 'cosh':
            currentInput = String(Math.cosh(num));
            break;
        case 'tanh':
            currentInput = String(Math.tanh(num));
            break;
        case 'sqrt':
            currentInput = String(Math.sqrt(num));
            break;
        case 'log':
            currentInput = String(Math.log10(num));
            break;
        case 'ln':
            currentInput = String(Math.log(num));
            break;
        case 'factorial':
            currentInput = String(factorial(num));
            break;
    }

    expression = func + "(" + num + ")";
    updateDisplay();
}

function factorial(n) {
    if (n < 0) return "Error";
    if (n === 0 || n === 1) return 1;

    let result = 1;
    for (let i = 2; i <= n; i++) {
        result *= i;
    }
    return result;
}

function clearAll() {
    currentInput = '';
    previousInput = '';
    operation = null;
    expression = '';
    shouldResetScreen = false;
    updateDisplay();
}

function deleteLast() {
    currentInput = currentInput.slice(0, -1);
    expression = expression.slice(0, -1);
    updateDisplay();
}

document.addEventListener('keydown', (e) => {
    if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
    else if (e.key === '.') appendNumber('.');
    else if (['+', '-', '*', '/'].includes(e.key)) chooseOperation(e.key);
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') deleteLast();
    else if (e.key === 'Escape') clearAll();
});
</script>

</body>
</html>
