<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Calculator</title>
    <style>
        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1e1e2f;
        }

        .calculator {
            background: #2d2d44;
            border-radius: 20px;
            padding: 25px;
            width: 350px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        /* Display Screen */
        .display {
            background: #1a1a2e;
            color: #ffffff;
            font-size: 2.8rem;
            text-align: right;
            padding: 20px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            min-height: 80px;
            word-break: break-all;
            letter-spacing: 1px;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.4);
        }

        /* Button Grid */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            padding: 20px;
            font-size: 1.6rem;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            background: #3d3d5c;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 4px 0 #1a1a2e;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #1a1a2e;
        }

        /* Operator buttons */
        .operator {
            background: #f39c12;
            color: #1a1a2e;
        }

        /* Clear & Delete */
        .clear {
            background: #e74c3c;
        }

        .delete {
            background: #e67e22;
        }

        /* Equals button */
        .equals {
            background: #2ecc71;
            color: #1a1a2e;
            grid-column: span 1;
        }

        /* Zero spans 2 columns */
        .zero {
            grid-column: span 2;
        }

        /* Responsive tweak */
        @media (max-width: 400px) {
            .calculator {
                width: 95%;
                padding: 15px;
            }
            button {
                padding: 15px;
                font-size: 1.3rem;
            }
            .display {
                font-size: 2.2rem;
                padding: 15px 18px;
            }
        }
    </style>
</head>
<body>

    <div class="calculator">
        <!-- Display Screen -->
        <div class="display" id="display">0</div>

        <!-- Buttons -->
        <div class="buttons">
            <!-- Row 1 -->
            <button class="clear" onclick="clearAll()">AC</button>
            <button class="delete" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="chooseOperation('/')">÷</button>
            <button class="operator" onclick="chooseOperation('*')">×</button>

            <!-- Row 2 -->
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="chooseOperation('-')">−</button>

            <!-- Row 3 -->
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="chooseOperation('+')">+</button>

            <!-- Row 4 -->
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="equals" onclick="calculate()">=</button>

            <!-- Row 5 -->
            <button class="zero" onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
        </div>
    </div>

    <script>
        // ---------- STATE ----------
        let currentInput = '';      // What's currently on the screen
        let previousInput = '';     // The number before the operator
        let operation = null;       // '+', '-', '*', '/'
        let shouldResetScreen = false;

        const display = document.getElementById('display');

        // ---------- UPDATE DISPLAY ----------
        function updateDisplay() {
            if (currentInput === '') {
                display.textContent = '0';
            } else {
                display.textContent = currentInput;
            }
        }

        // ---------- APPEND NUMBER ----------
        function appendNumber(num) {
            // If screen should reset, start fresh
            if (shouldResetScreen) {
                currentInput = '';
                shouldResetScreen = false;
            }

            // Prevent multiple decimals
            if (num === '.' && currentInput.includes('.')) return;

            // Limit input length
            if (currentInput.length >= 15) return;

            currentInput += num;
            updateDisplay();
        }

        // ---------- CHOOSE OPERATION ----------
        function chooseOperation(op) {
            if (currentInput === '') {
                // If user clicks operator after an equals, let them chain
                if (previousInput !== '') {
                    operation = op;
                }
                return;
            }

            // If there's already a pending operation, calculate it first
            if (previousInput !== '' && operation !== null) {
                calculate();
            }

            // Set the operation and move current to previous
            operation = op;
            previousInput = currentInput;
            currentInput = '';
            shouldResetScreen = false;
            updateDisplay();
        }

        // ---------- CALCULATE ----------
        function calculate() {
            if (operation === null || previousInput === '' || currentInput === '') {
                // If just pressing '=', show the current number
                if (currentInput === '' && previousInput !== '') {
                    currentInput = previousInput;
                    updateDisplay();
                }
                return;
            }

            const prev = parseFloat(previousInput);
            const curr = parseFloat(currentInput);
            let result;

            if (isNaN(prev) || isNaN(curr)) return;

            switch (operation) {
                case '+':
                    result = prev + curr;
                    break;
                case '-':
                    result = prev - curr;
                    break;
                case '*':
                    result = prev * curr;
                    break;
                case '/':
                    if (curr === 0) {
                        currentInput = 'Error';
                        previousInput = '';
                        operation = null;
                        updateDisplay();
                        return;
                    }
                    result = prev / curr;
                    break;
                default:
                    return;
            }

            // Round to avoid floating-point issues
            result = parseFloat(result.toFixed(10));

            // Store result for chaining
            currentInput = String(result);
            previousInput = '';
            operation = null;
            shouldResetScreen = true; // Next number starts fresh
            updateDisplay();
        }

        // ---------- CLEAR ALL ----------
        function clearAll() {
            currentInput = '';
            previousInput = '';
            operation = null;
            shouldResetScreen = false;
            updateDisplay();
        }

        // ---------- DELETE LAST ----------
        function deleteLast() {
            if (shouldResetScreen) {
                clearAll();
                return;
            }
            currentInput = currentInput.slice(0, -1);
            updateDisplay();
        }

        // ---------- KEYBOARD SUPPORT ----------
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            else if (e.key === '.') appendNumber('.');
            else if (e.key === '+') chooseOperation('+');
            else if (e.key === '-') chooseOperation('-');
            else if (e.key === '*') chooseOperation('*');
            else if (e.key === '/') {
                e.preventDefault();
                chooseOperation('/');
            } else if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculate();
            } else if (e.key === 'Backspace') deleteLast();
            else if (e.key === 'Escape') clearAll();
        });
    </script>

</body>
</html>
