<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Scientific Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;

body{
    display:flex;

<body>

<div class="calculator">
    <div class="display-container">
        <div id="expression" class="expression"></div>
        <div id="display" class="result">0</div>
    </div>

    <div class="buttons">
        <button class="operator" onclick="appendValue('sin(')">sin</button>
        <button class="operator" onclick="appendValue('cos(')">cos</button>
        <button class="operator" onclick="appendValue('tan(')">tan</button>
        <button class="operator" onclick="appendValue('sinh(')">sinh</button>
        <button class="operator" onclick="appendValue('cosh(')">cosh</button>

        <button class="operator" onclick="appendValue('tanh(')">tanh</button>
        <button class="operator" onclick="appendValue('sqrt(')">√</button>
        <button class="operator" onclick="appendValue('log(')">log</button>
        <button class="operator" onclick="appendValue('ln(')">ln</button>
        <button class="operator" onclick="appendValue('!')">x!</button>

        <button class="clear" onclick="clearAll()">AC</button>
        <button class="delete" onclick="deleteLast()">⌫</button>
        <button onclick="appendValue('(')">(</button>
        <button onclick="appendValue(')')">)</button>
        <button onclick="appendValue('^')">xʸ</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button onclick="appendValue('π')">π</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('*')">×</button>
        <button onclick="appendValue('e')">e</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('-')">−</button>
        <button class="equals" onclick="calculate()">=</button>

        <button class="zero" onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="operator" onclick="appendValue('+')">+</button>
    </div>
</div>

<script>
let expression = "";

const display = document.getElementById("display");
const expressionDisplay = document.getElementById("expression");

function appendValue(val){
    expression += val;
    updateDisplay();
}

function clearAll(){
    expression = "";
    updateDisplay();
}

function deleteLast(){
    expression = expression.slice(0,-1);
    updateDisplay();
}

function updateDisplay(){
    expressionDisplay.textContent = expression;
    display.textContent = expression || "0";
}

function factorial(n){
    if(n < 0 || !Number.isInteger(n)) throw Error("Invalid factorial");
    if(n === 0 || n === 1) return 1;
    let r = 1;
    for(let i=2;i<=n;i++) r*=i;
    return r;
}

function tokenize(str){
    const regex = /sinh|cosh|tanh|sin|cos|tan|sqrt|log|ln|π|e|\d+(\.\d+)?|[+\-*/^()!]/g;
    return str.match(regex) || [];
}

function precedence(op){
    return {
        "+":1,
        "-":1,
        "*":2,
        "/":2,
        "^":3
    }[op] || 0;
}

function isFunction(token){
    return ["sin","cos","tan","sinh","cosh","tanh","sqrt","log","ln"].includes(token);
}

function toRPN(tokens){
    let output = [];
    let stack = [];

    for(let token of tokens){
        if(!isNaN(token) || token==="π" || token==="e"){
            output.push(token);
        }
        else if(isFunction(token)){
            stack.push(token);
        }
        else if(token==="!"){
            output.push(token);
        }
        else if(["+","-","*","/","^"].includes(token)){
            while(
                stack.length &&
                precedence(stack[stack.length-1]) >= precedence(token)
            ){
                output.push(stack.pop());
            }
            stack.push(token);
        }
        else if(token==="("){
            stack.push(token);
        }
        else if(token===")"){
            while(stack.length && stack[stack.length-1] !== "("){
                output.push(stack.pop());
            }
            stack.pop();

            if(stack.length && isFunction(stack[stack.length-1])){
                output.push(stack.pop());
            }
        }
    }

    while(stack.length) output.push(stack.pop());

    return output;
}

function evaluateRPN(rpn){
    let stack = [];

    for(let token of rpn){
        if(!isNaN(token)){
            stack.push(Number(token));
        }
        else if(token==="π"){
            stack.push(Math.PI);
        }
        else if(token==="e"){
            stack.push(Math.E);
        }
        else if(token==="!"){
            let a = stack.pop();
            stack.push(factorial(a));
        }
        else if(["+","-","*","/","^"].includes(token)){
            let b = stack.pop();
            let a = stack.pop();

            switch(token){
                case "+": stack.push(a+b); break;
                case "-": stack.push(a-b); break;
                case "*": stack.push(a*b); break;
                case "/":
                    if(b===0) throw Error("Divide by zero");
                    stack.push(a/b);
                    break;
                case "^": stack.push(Math.pow(a,b)); break;
            }
        }
        else if(isFunction(token)){
            let a = stack.pop();

            switch(token){
                case "sin": stack.push(Math.sin(a*Math.PI/180)); break;
                case "cos": stack.push(Math.cos(a*Math.PI/180)); break;
                case "tan": stack.push(Math.tan(a*Math.PI/180)); break;
                case "sinh": stack.push(Math.sinh(a)); break;
                case "cosh": stack.push(Math.cosh(a)); break;
                case "tanh": stack.push(Math.tanh(a)); break;
                case "sqrt": stack.push(Math.sqrt(a)); break;
                case "log": stack.push(Math.log10(a)); break;
                case "ln": stack.push(Math.log(a)); break;
            }
        }
    }

    return stack[0];
}

function calculate(){
    try{
        const tokens = tokenize(expression);
        const rpn = toRPN(tokens);
        let result = evaluateRPN(rpn);

        if(!isFinite(result)) throw Error();

        result = parseFloat(result.toFixed(10));

        expressionDisplay.textContent = expression + "=";
        display.textContent = result;
        expression = String(result);

    }catch{
        display.textContent = "Error";
        expression = "";
    }
}

document.addEventListener("keydown",(e)=>{
    if("0123456789.+-*/^()!".includes(e.key)){
        appendValue(e.key);
    }
    else if(e.key==="Enter"){
        calculate();
    }
    else if(e.key==="Backspace"){
        deleteLast();
    }
    else if(e.key==="Escape"){
        clearAll();
    }
});
</script>

</body>
</html>
